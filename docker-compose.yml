services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command:
      - sh
      - -c
      - echo "TODO: implement backend container command" && sleep infinity
    env_file:
      - ./backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command:
      - sh
      - -c
      - echo "TODO: implement frontend container command" && sleep infinity
    env_file:
      - ./frontend/.env.example

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smarthire_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarthire_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
